<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 81.9 71.52" width="100%" height="100%">
  <defs>
    <linearGradient id="live-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f2cc0c"/>
      <stop offset="100%" stop-color="#ff9830"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <marker id="arrowhead" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto">
      <polygon points="0 0, 5 2.5, 0 5" fill="#84aff1" />
    </marker>
  </defs>

  <rect x="2" y="2" width="77.9" height="67.52" rx="6" fill="#1e2c45" stroke="#3865ab" stroke-width="2.5" />

  <circle cx="16" cy="31" r="6" fill="#84aff1" />

  <rect x="33" y="14" width="16" height="10" rx="1" fill="#84aff1" />

  <rect x="33" y="30" width="16" height="10" rx="1" fill="#84aff1" />

  <polygon points="63,24 71,32 63,40 55,32" fill="url(#live-gradient)" filter="url(#glow)" />

  <path d="M 16 23 C 16 17, 22 19, 30 19" fill="none" stroke="#84aff1" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <path d="M 23 33 L 30 33" fill="none" stroke="#84aff1" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <path d="M 41 25 L 41 27.5" fill="none" stroke="#84aff1" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <path d="M 50 33.5 L 53 33.5" fill="none" stroke="#84aff1" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <path d="M 50 19 C 58 19, 63 21, 63 23" fill="none" stroke="#84aff1" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <path d="M 63 42 C 63 48, 51 48, 43 41" fill="none" stroke="#84aff1" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <text x="14" y="58" font-family="Arial, sans-serif" font-size="15" font-weight="900" fill="url(#live-gradient)">LIVE</text>

  <g transform="translate(63, 53)">
    <circle cx="0" cy="0" r="7.5" fill="none" stroke="url(#live-gradient)" stroke-width="1.5" />

    <circle cx="0" cy="0" r="7.5" fill="none" stroke="url(#live-gradient)" stroke-width="1" opacity="0.6">
      <animate attributeName="r" values="7.5; 12; 7.5" dur="1.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.6; 0; 0.6" dur="1.5s" repeatCount="indefinite" />
    </circle>

    <path d="M 0 -4
             C -1.5 -4, -2.5 -2.5, -2.5 -0.5
             L -3.5 2.5
             C -3.5 3, -3 3.5, -2.5 3.5
             L 2.5 3.5
             C 3 3.5, 3.5 3, 3.5 2.5
             L 2.5 -0.5
             C 2.5 -2.5, 1.5 -4, 0 -4 Z
             M -1 4 A 1 1 0 0 0 1 4 Z"
          fill="url(#live-gradient)" />
  </g>
</svg>
